{% extends 'layout.html' %}
{% block content %}
<style>
    /* 🚀 NO SCROLL FOR ACTIVATION PAGE */
    html, body {
        overflow: hidden !important;
        height: 100% !important;
    }

    .activation-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 40px;
        padding: clamp(30px, 5vh, 50px) 30px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.06);
        max-width: 450px;
        width: 100%;
        text-align: center;
        animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardEntrance {
        from { opacity: 0; transform: scale(0.9) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .icon-seal {
        width: 70px;
        height: 70px;
        background: #fff;
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 25px;
        font-size: 2rem;
        box-shadow: 0 10px 20px rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.05);
    }

    .activation-title {
        font-weight: 800;
        font-size: 1.8rem;
        letter-spacing: -1px;
        color: #1d1d1f;
        margin-bottom: 8px;
    }

    .activation-subtitle {
        color: #86868b;
        font-weight: 500;
        font-size: 0.9rem;
        margin-bottom: 35px;
        line-height: 1.4;
    }

    /* Premium Input */
    .input-group-premium {
        text-align: left;
        margin-bottom: 30px;
    }

    .label-premium {
        display: block;
        font-weight: 800;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--pageant-gold);
        margin-bottom: 10px;
        padding-left: 5px;
    }

    .judge-input {
        width: 100%;
        background: #f5f5f7;
        border: 1.5px solid #d2d2d7;
        border-radius: 18px;
        padding: 16px 20px;
        font-size: 1.1rem;
        font-weight: 600;
        color: #1d1d1f;
        transition: all 0.3s ease;
        outline: none;
    }

    .judge-input:focus {
        background: #fff;
        border-color: #007AFF;
        box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        transform: translateY(-2px);
    }

    /* 🔥 THE BUSSIN BUTTON (SOLID BLUE, NO WHITE) */
    .btn-activation {
        background: #007AFF; /* Solid Coolaire Blue */
        color: white !important;
        width: 100%;
        padding: 18px;
        border-radius: 20px;
        font-weight: 800;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        border: none;
        box-shadow: 0 10px 25px rgba(0, 122, 255, 0.25);
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        cursor: pointer;
    }

    .btn-activation:hover {
        background: #0062cc;
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(0, 122, 255, 0.35);
    }

    .btn-activation:active {
        transform: scale(0.98);
    }

    .verify-badge {
        margin-top: 25px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        background: rgba(0, 122, 255, 0.05);
        border-radius: 100px;
        color: #007AFF;
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
</style>

<div class="activation-card">

    <div class="icon-seal">✒️</div>

    <h2 class="activation-title">Ballot Activation</h2>
    <p class="activation-subtitle">
        Please sign your <strong>Full Name</strong> to initialize your digital judging portal for the 2026 Pageant.
    </p>

    <form method="POST" id="activationForm">
    <div class="input-group-premium">
        <label class="label-premium">Select Your Name</label>
        <select name="judge_name" class="judge-input" required>
            <option value="" disabled selected>-- Select from List --</option>
            {% for j in judges %}
                <option value="{{ j.name }}">{{ j.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn-activation" id="submitBtn">Initialize Ballot</button>
</form>

    <div class="verify-badge">
        <i class="fas fa-shield-check"></i> Identity Secured
    </div>
</div>

<script>
    const form = document.getElementById('activationForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', () => {
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin me-2"></i> Activating...';
        btn.style.opacity = '0.8';
        btn.style.pointerEvents = 'none';
    });
</script>

{% endblock %}
