{% extends 'layout.html' %}
{% block content %}

<style>
    /* Premium Glass Card - Scaled for No-Scroll */
    .bussin-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 35px;
        padding: clamp(30px, 5vh, 50px) 25px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.06);
        max-width: 380px;
        width: 100%;
        text-align: center;
        animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardEntrance {
        from { opacity: 0; transform: scale(0.9) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Icon Styling */
    .icon-box {
        width: 60px;
        height: 60px;
        background: #fff;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 1.8rem;
        box-shadow: 0 10px 20px rgba(0,0,0,0.04);
    }

    .login-title {
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: -0.5px;
        color: #1d1d1f;
        margin-bottom: 5px;
    }

    .login-subtitle {
        color: #86868b;
        font-weight: 500;
        font-size: 0.85rem;
        margin-bottom: 30px;
    }

    /* PIN Input Group */
    .code-input-group {
        display: flex;
        justify-content: center;
        gap: clamp(8px, 2vw, 15px);
        margin: 30px 0;
    }

    .digit-box {
        width: clamp(55px, 12vw, 65px);
        height: clamp(75px, 15vh, 85px);
        background: #fff;
        border: 1.5px solid #d2d2d7;
        border-radius: 18px;
        font-size: 2rem;
        font-weight: 700;
        text-align: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        outline: none;
        color: #1d1d1f;
        /* Prevent zoom on iPhone focus */
        font-size: 2rem;
    }

    .digit-box:focus {
        border-color: #007AFF;
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 122, 255, 0.15);
    }

    /* Feedback Styling */
    .error-shake {
        animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        border: 1.5px solid rgba(255, 59, 48, 0.4) !important;
    }

    @keyframes shake {
        10%, 90% { transform: translate3d(-1px, 0, 0); }
        20%, 80% { transform: translate3d(2px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    .access-denied {
        color: #FF3B30;
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 1px;
        margin-bottom: 15px;
        text-transform: uppercase;
    }

    .loading-status {
        height: 20px;
        margin-top: 10px;
    }
</style>

<div class="bussin-card {% if get_flashed_messages() %}error-shake{% endif %}">

    <div class="icon-box">👑</div>

    <h2 class="login-title">Secure Access</h2>
    <p class="login-subtitle">Please enter your 4-digit security key</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="access-denied animate__animated animate__fadeIn">
            <i class="fas fa-exclamation-triangle me-1"></i> Access Denied
        </div>
      {% endif %}
    {% endwith %}

    <form id="loginForm" method="POST">
        <input type="hidden" name="access_code" id="final_code">
        <div class="code-input-group">
            <!-- Using type="tel" and inputmode="numeric" for perfect mobile keypad -->
            <input type="tel" class="digit-box" maxlength="1" pattern="[0-9]*" inputmode="numeric" autocomplete="one-time-code" autofocus>
            <input type="tel" class="digit-box" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="tel" class="digit-box" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="tel" class="digit-box" maxlength="1" pattern="[0-9]*" inputmode="numeric">
        </div>
    </form>

    <div class="loading-status">
        <div id="loading" class="d-none">
            <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
            <span class="small fw-bold text-primary" style="letter-spacing: 1px;">VERIFYING...</span>
        </div>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('.digit-box');
    const finalInput = document.getElementById('final_code');
    const form = document.getElementById('loginForm');
    const loading = document.getElementById('loading');

    inputs.forEach((input, index) => {
        // Handle inputting numbers
        input.addEventListener('input', (e) => {
            const value = e.target.value;

            // Clean non-numbers
            if (!/^\d$/.test(value)) {
                e.target.value = '';
                return;
            }

            // Auto-advance
            if (value && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }

            // Submission check
            let code = "";
            inputs.forEach(i => code += i.value);
            if (code.length === 4) {
                // Blur inputs to hide mobile keyboard
                inputs.forEach(i => i.blur());
                loading.classList.remove('d-none');
                finalInput.value = code;
                setTimeout(() => form.submit(), 600);
            }
        });

        // Handle backspace navigation
        input.addEventListener('keydown', (e) => {
            if (e.key === "Backspace" && !e.target.value && index > 0) {
                inputs[index - 1].focus();
            }
        });

        // Clean slate on click
        input.addEventListener('click', (e) => {
            e.target.select();
        });
    });
</script>

{% endblock %}
