{% extends 'layout.html' %}
{% block content %}
<style>
    .poll-card {
        background: white; border-radius: 30px; padding: 40px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 500px; width: 100%;
    }
    .candidate-option {
        border: 2px solid #f5f5f7; border-radius: 15px; padding: 15px;
        margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
    }
    .candidate-option:hover { border-color: #007AFF; background: #f0f7ff; }
    input[type="radio"]:checked + .candidate-option { border-color: #007AFF; background: #f0f7ff; }
</style>

<div class="poll-card mx-auto text-center">
    <h2 class="fw-900 mb-2">People's Choice</h2>
    <p class="text-muted mb-4">Official Employee Voting Portal</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="alert alert-danger rounded-pill small fw-bold">{{ messages[0] }}</div>{% endif %}
    {% endwith %}

    <form method="POST">
        <div class="text-start mb-4">
            <label class="small fw-bold text-muted text-uppercase mb-2">Employee ID Number</label>
            <input type="text" name="employee_id" class="form-control form-control-lg rounded-pill" placeholder="Enter ID (e.g. EMP-123)" required>
        </div>

        <div class="text-start mb-4">
            <label class="small fw-bold text-muted text-uppercase mb-2">Select Candidate</label>
            <div class="candidate-list">
                {% for can in candidates %}
                <label class="w-100">
                    <input type="radio" name="candidate_id" value="{{ can.id }}" class="d-none" required>
                    <div class="candidate-option d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fw-bold">{{ can.name }}</div>
                            <div class="small text-muted">{{ can.department }}</div>
                        </div>
                        <i class="fas fa-check-circle text-primary opacity-0"></i>
                    </div>
                </label>
                {% endfor %}
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold py-3 shadow">CAST MY VOTE</button>
    </form>
</div>

<script>
    // Visual feedback for selection
    document.querySelectorAll('input[type="radio"]').forEach(input => {
        input.addEventListener('change', () => {
            document.querySelectorAll('.candidate-option').forEach(el => el.classList.remove('border-primary'));
            document.querySelectorAll('.fa-check-circle').forEach(el => el.style.opacity = '0');
            if(input.checked) {
                input.nextElementSibling.classList.add('border-primary');
                input.nextElementSibling.querySelector('.fa-check-circle').style.opacity = '1';
            }
        });
    });
</script>
{% endblock %}
